version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build:seo
        - cp dist/dashboard/browser/index.csr.html dist/dashboard/browser/index.html
  artifacts:
    baseDirectory: dist/dashboard/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*