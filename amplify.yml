version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20 || . ~/.nvm/nvm.sh && nvm use 20
            - npm ci
            # vygeneruj zo Strapi zoznam rout pre prerender
            - npm run routes:gen
        build:
          commands:
            - npm run build:ssr
            - npm run prerender
      artifacts:
        baseDirectory: dist/majolika/browser
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
