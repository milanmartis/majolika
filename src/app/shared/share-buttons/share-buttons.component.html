<!-- src/app/shared/share-buttons/share-buttons.component.html -->
<h6>{{ 'HOME.SHARE_US' | translate }}</h6>

<div class="share-buttons">
  <a
    *ngFor="let link of shareLinks"
    [href]="link.url"
    target="_blank"
    rel="noopener noreferrer"
    [attr.aria-label]="'Zdieľať na ' + link.platform"
  >
    <img
      [src]="'/assets/soc/' + link.platform + '.svg'"
      [alt]="link.platform + ' icon'"
      class="icon"
    />
  </a>

  <button
    (click)="shareNative()"
    class="native-share-button"
    aria-label="Zdieľať cez zariadenie"
    type="button"
  >
    <img src="/assets/soc/share.svg" alt="Zdieľať" class="icon" />
  </button>
</div>
