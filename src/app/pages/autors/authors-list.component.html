<!-- authors-list.component.html -->
<div *ngIf="error" class="error">{{ error }}</div>

<ng-container *ngFor="let g of grouped">
  <ng-container *ngIf="g.items.length">


 

    <div class="grid">
      <button class="card" *ngFor="let a of g.items; trackBy: trackById" (click)="openAuthor(a)">
        <img *ngIf="a.fotoUrl" [src]="a.fotoUrl" [alt]="a.fotoAlt || a.meno" loading="lazy" />
        <div class="content">
          <h3>{{ a.meno }}</h3>
          <h4 class="pozicia" *ngIf="a.pozicia">{{ a.pozicia }}</h4>
        </div>
      </button>
    </div>

    <hr class="role-separator" />
  </ng-container>
</ng-container>
